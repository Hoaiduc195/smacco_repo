# ── Upstream services ─────────────────────────
upstream frontend {
    server frontend:3000;
}

upstream core_service {
    server core-service:3001;
}

upstream ai_service {
    server ai-service:8000;
}

upstream recommendation_service {
    server recommendation-service:8001;
}

# ── Server ────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # ── Core Service API ──────────────────────
    location /api/v1/ {
        proxy_pass http://core_service/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── AI Service API ────────────────────────
    location /api/v1/ai/ {
        proxy_pass http://ai_service/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Recommendation Service API ────────────
    location /api/v1/recommendations/ {
        proxy_pass http://recommendation_service/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend (catch all) ──────────────────
    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
