# ============================================
# Docker Compose — Modular Monolith
# ============================================
# Only 2 containers: app + postgres (was 6 in microservices)

services:
  # ── Monolith Application ─────────────────────
  app:
    build: .
    container_name: accommodation-app
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - postgres
    command: sh -c "npx prisma migrate deploy || npx prisma db push; node dist/main"
    networks:
      - app-network

  # ── PostgreSQL ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-accommodation_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
