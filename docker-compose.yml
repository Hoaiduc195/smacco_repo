# ============================================
# Docker Compose — Production
# ============================================

services:
  # ── API Gateway (Nginx) ──────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "80:80"
    depends_on:
      - core-service
      - ai-service
      - recommendation-service
      - frontend
    networks:
      - app-network

  # ── Frontend ────────────────────────────────
  frontend:
    build: ./services/frontend
    container_name: frontend
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    command: npm run dev
    env_file:
      - ./services/frontend/.env
    networks:
      - app-network

  # ── Core Service (NestJS) ───────────────────
  core-service:
    build: ./services/core-service
    container_name: core-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/core-service/.env
    depends_on:
      - postgres
    volumes:
      - ./services/core-service:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - app-network

  # ── AI Service (FastAPI) ────────────────────
  ai-service:
    build: ./services/ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./services/ai-service/.env
    depends_on:
      - postgres
    volumes:
      - ./services/ai-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

  # ── Recommendation Service (FastAPI) ────────
  recommendation-service:
    build: ./services/recommendation-service
    container_name: recommendation-service
    ports:
      - "8001:8001"
    env_file:
      - ./services/recommendation-service/.env
    depends_on:
      - postgres
    volumes:
      - ./services/recommendation-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - app-network

  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-accommodation_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
