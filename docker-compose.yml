# ============================================
# Docker Compose — Production
# ============================================

services:
  # ── API Gateway (Nginx) ──────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "80:80"
    depends_on:
      - core-service
      - ai-service
      - recommendation-service
      - frontend
    networks:
      - app-network

  # ── Frontend ────────────────────────────────
  frontend:
    build: ./services/frontend
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - ./services/frontend/.env
    networks:
      - app-network

  # ── Core Service (NestJS) ───────────────────
  core-service:
    build: ./services/core-service
    container_name: core-service
    ports:
      - "3001:3001"
    env_file:
      - ./services/core-service/.env
    depends_on:
      - mongo
    networks:
      - app-network

  # ── AI Service (FastAPI) ────────────────────
  ai-service:
    build: ./services/ai-service
    container_name: ai-service
    ports:
      - "8000:8000"
    env_file:
      - ./services/ai-service/.env
    depends_on:
      - mongo
    networks:
      - app-network

  # ── Recommendation Service (FastAPI) ────────
  recommendation-service:
    build: ./services/recommendation-service
    container_name: recommendation-service
    ports:
      - "8001:8001"
    env_file:
      - ./services/recommendation-service/.env
    depends_on:
      - mongo
    networks:
      - app-network

  # ── MongoDB ─────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
